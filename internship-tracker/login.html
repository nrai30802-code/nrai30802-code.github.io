<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DITS - Student Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-vh-100 d-flex flex-column">
    <div id="preloader" class="preloader"><div class="loader-spinner"></div></div>

    <nav class="navbar navbar-expand-lg navbar-light glass-navbar sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-graduation-cap text-primary fs-3 me-2"></i>
                <span class="fw-bold fs-4 text-dark display-font">DITS</span>
            </a>
        </div>
    </nav>

    <section class="py-5 flex-grow-1 d-flex align-items-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="glass-card p-4 p-md-5 bg-white">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center p-3 rounded-circle bg-primary bg-opacity-10 text-primary mb-3">
                                <i class="fa-solid fa-user-graduate fs-3"></i>
                            </div>
                            <h2 class="display-font text-dark fw-bold">Student Portal</h2>
                            <p class="text-secondary small">Access your internship tracker dashboard</p>
                        </div>

                        <div id="alertBox"></div>

                        <form id="loginForm" class="needs-validation" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-regular fa-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0" id="email" placeholder="student@tracker.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white border-end-0 text-muted"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" class="form-control border-start-0" id="password" placeholder="••••••••" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-gradient w-100 py-3 mb-3">Login</button>
                            
                            <div class="text-center">
                                <p class="text-muted small mb-0">Don't have an account? <a href="register.html" class="text-primary fw-semibold text-decoration-none">Register here</a></p>
                            </div>
                        </form>
                    </div>

                    <div class="glass-card mt-3 p-3 bg-light border-0 text-center small text-secondary">
                        <span class="fw-bold"><i class="fa-solid fa-circle-info text-primary me-1"></i> Demo Credentials:</span><br>
                        Email: <code>student@tracker.com</code> &nbsp;|&nbsp; Password: <code>student123</code>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 mt-auto">
        <div class="container text-center text-secondary small">
            &copy; 2026 Digital Internship Tracking System. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('dits_current_student')) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (this.checkValidity()) {
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('password').value;
                
                // Fetch mock database
                const users = JSON.parse(localStorage.getItem('dits_users') || '[]');
                const student = users.find(u => u.email === email && u.password === pass);

                if (student) {
                    localStorage.setItem('dits_current_student', JSON.stringify(student));
                    window.location.href = 'dashboard.html';
                } else {
                    document.getElementById('alertBox').innerHTML = `
                        <div class="alert alert-danger glass-card border-danger border-opacity-25 p-3 mb-3">
                            <i class="fa-solid fa-circle-exclamation me-1"></i> Invalid email or password.
                        </div>`;
                }
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
