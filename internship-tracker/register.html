<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DITS - Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-vh-100 d-flex flex-column">
    <div id="preloader" class="preloader"><div class="loader-spinner"></div></div>

    <nav class="navbar navbar-expand-lg navbar-light glass-navbar sticky-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-graduation-cap text-primary fs-3 me-2"></i>
                <span class="fw-bold fs-4 text-dark display-font">DITS</span>
            </a>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-9">
                    <div class="glass-card p-4 p-md-5 bg-white">
                        <div class="text-center mb-4">
                            <div class="d-inline-flex align-items-center justify-content-center p-3 rounded-circle bg-primary bg-opacity-10 text-primary mb-3">
                                <i class="fa-solid fa-user-plus fs-3"></i>
                            </div>
                            <h2 class="display-font text-dark fw-bold">Student Registration</h2>
                            <p class="text-secondary small">Sign up to manage and track your internships</p>
                        </div>

                        <div id="alertBox"></div>

                        <form id="registerForm" class="needs-validation" novalidate>
                            <div class="row g-3">
                                <div class="col-12">
                                    <label for="full_name" class="form-label fw-semibold">Full Name *</label>
                                    <input type="text" class="form-control" id="full_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label fw-semibold">Email *</label>
                                    <input type="email" class="form-control" id="email" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="password" class="form-label fw-semibold">Password *</label>
                                    <input type="password" class="form-control" id="password" minlength="6" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="roll_no" class="form-label fw-semibold">Roll Number *</label>
                                    <input type="text" class="form-control" id="roll_no" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="phone" class="form-label fw-semibold">Phone Number</label>
                                    <input type="tel" class="form-control" id="phone">
                                </div>
                                <div class="col-12">
                                    <label for="department" class="form-label fw-semibold">Department *</label>
                                    <select class="form-select" id="department" required>
                                        <option value="" disabled selected>Select department</option>
                                        <option value="Computer Applications">Computer Applications (MCA)</option>
                                        <option value="Computer Science Engineering">B.Tech CSE</option>
                                        <option value="Information Technology">B.Tech IT</option>
                                    </select>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-gradient w-100 py-3">Register Account</button>
                                </div>
                            </div>
                            <div class="text-center mt-3">
                                <p class="text-muted small mb-0">Already have an account? <a href="login.html" class="text-primary fw-semibold text-decoration-none">Login here</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-4 mt-auto">
        <div class="container text-center text-secondary small">
            &copy; 2026 Digital Internship Tracking System. All rights reserved.
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if (this.checkValidity()) {
                const name = document.getElementById('full_name').value.trim();
                const email = document.getElementById('email').value.trim();
                const pass = document.getElementById('password').value;
                const roll = document.getElementById('roll_no').value.trim();
                const phone = document.getElementById('phone').value.trim();
                const dept = document.getElementById('department').value;
                
                const users = JSON.parse(localStorage.getItem('dits_users') || '[]');
                
                // Check duplicate
                if (users.some(u => u.email === email || u.roll === roll)) {
                    document.getElementById('alertBox').innerHTML = `
                        <div class="alert alert-danger glass-card border-danger border-opacity-25 p-3 mb-3">
                            Email or Roll Number already registered.
                        </div>`;
                    return;
                }

                const newUser = {
                    id: users.length + 1,
                    email: email,
                    password: pass,
                    name: name,
                    roll: roll,
                    phone: phone,
                    dept: dept,
                    pic: 'assets/images/default-avatar.png'
                };
                
                users.push(newUser);
                localStorage.setItem('dits_users', JSON.stringify(users));
                
                // Add welcome notification
                const notifs = JSON.parse(localStorage.getItem('dits_notifications') || '[]');
                notifs.push({ student_id: newUser.id, message: 'Welcome to the Digital Internship Tracking System!', read: false, time: new Date().toISOString() });
                localStorage.setItem('dits_notifications', JSON.stringify(notifs));

                localStorage.setItem('dits_current_student', JSON.stringify(newUser));
                window.location.href = 'dashboard.html';
            } else {
                this.classList.add('was-validated');
            }
        });
    </script>
</body>
</html>
